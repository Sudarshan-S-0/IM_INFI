<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM_INFI - Verification Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0b10;
            --card-bg: rgba(18, 20, 32, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f3f9;
            --text-secondary: #949db2;
            --accent-blue: #00d2ff;
            --accent-blue-glow: rgba(0, 210, 255, 0.35);
            --accent-ruby: #ff3c6b;
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'Outfit', sans-serif;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .glass-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.08) 0%, transparent 50%);
            background-size: cover;
        }
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.5s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: inline-block;
        }
        h2 {
            font-family: var(--font-heading);
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 40%, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }
        input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-blue-glow);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-family: var(--font-heading);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--accent-blue), #0084ff);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            transition: all 0.2s ease;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.5);
        }
        .error-message {
            color: var(--accent-ruby);
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="glass-bg"></div>
    <div class="login-card">
        <span class="logo-icon">🛡️</span>
        <h2>IM_INFI</h2>
        <div class="subtitle">Secure Verification System Sign In</div>
        <div class="error-message" id="error-box">Invalid username or password.</div>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Authenticate</button>
        </form>
    </div>
    <script>
        const form = document.getElementById("login-form");
        const errorBox = document.getElementById("error-box");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorBox.style.display = "none";
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: user, password: pass })
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated) {
                        // Redirect to main dashboard page
                        window.location.href = "/dashboard.html";
                    } else {
                        errorBox.style.display = "block";
                    }
                } else {
                    errorBox.style.display = "block";
                }
            } catch (err) {
                errorBox.style.display = "block";
            }
        });
    </script>
</body>
</html>
